name: build_test
on:
  pull_request:
env:
  MYNAME: hinoshiba
jobs:
  builder:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - IMGNAME: workbench
          - IMGNAME: golang
          - IMGNAME: rust
          - IMGNAME: python
          - IMGNAME: node
          - IMGNAME: research
          - IMGNAME: cvemaker
          - IMGNAME: claude-codex
    steps:
      - name: Checkout from repository.
        uses: actions/checkout@v2
      - name: Fetch master
        run: git fetch origin master
      - name: has diff for the image ?
        id: diff_check
        run: |
          # TEMP(ci-verify): the trailing '|| true' forces every matrix image to
          # build+run so the build_test workflow itself can be exercised across all
          # images regardless of diff. REVERT this line after confirming the Actions
          # results to restore diff-based efficiency.
          git diff --name-only origin/master HEAD | grep -e "dockerfiles/${{matrix.IMGNAME}}" -e "version/${{matrix.IMGNAME}}" || true
        continue-on-error: true
      - name: Get LANG_TYPE
        id: LANG
        run: |
          echo "TYPE=$(cat dockerfiles/${{matrix.IMGNAME}}/Dockerfile | grep FROM | head -n1 | sed -n 's/^FROM \([^:]*\):.*$/\1/p')" >> "$GITHUB_OUTPUT"
          echo "TAG=$(cat dockerfiles/${{matrix.IMGNAME}}/Dockerfile | grep FROM | head -n1 | sed -n 's/^.*\${\([^}]*\)}.*$/\1/p')" >> "$GITHUB_OUTPUT"
        if: steps.diff_check.outcome == 'success'
      - name: Get Version
        id: VERSION
        run: |
          echo "TARGET=$(cat version/${{ steps.LANG.outputs.TYPE }}/${{ steps.LANG.outputs.TAG }})" >> "$GITHUB_OUTPUT"
        if: steps.diff_check.outcome == 'success'
      - name: Set up Docker Buildx.
        uses: docker/setup-buildx-action@v2
        if: steps.diff_check.outcome == 'success'
      - name: Get Docker GID
        id: docker_gid
        run: |
          echo "GID=$(getent group docker | awk -F: '{print $3}')" >> "$GITHUB_OUTPUT"
        if: steps.diff_check.outcome == 'success'
      - name: Build test (all).
        uses: docker/build-push-action@v2
        with:
          context: dockerfiles/${{matrix.IMGNAME}}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            ${{ steps.LANG.outputs.TAG }}=${{ steps.VERSION.outputs.TARGET }}
            local_docker_gid=${{ steps.docker_gid.outputs.GID }}
          tags: |
            ${{ env.MYNAME }}/${{ matrix.IMGNAME }}:latest
        if: steps.diff_check.outcome == 'success'
      - name: Run test x64.
        run: |
          make install
          make target=${{ matrix.IMGNAME }} builder=${{ env.MYNAME }} cmd="echo ok" test
        if: steps.diff_check.outcome == 'success'
